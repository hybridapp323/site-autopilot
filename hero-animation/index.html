<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AutoPilot CRM — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --background: 210 20% 98%;
  --foreground: 220 20% 10%;
  --card: 0 0% 100%;
  --primary: 230 100% 50%;
  --primary-foreground: 0 0% 100%;
  --secondary: 210 15% 93%;
  --muted: 210 15% 95%;
  --muted-foreground: 220 10% 50%;
  --accent: 225 80% 95%;
  --accent-foreground: 230 100% 35%;
  --border: 214 20% 90%;
  --destructive: 0 72% 51%;
  --success: 142 60% 40%;
  --warning: 38 92% 50%;
  --info: 210 80% 52%;
  --sidebar-background: 0 0% 100%;
  --chat-inbound: 210 15% 95%;
  --chat-outbound: 225 70% 94%;
  --chat-system: 38 60% 95%;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: transparent;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11', 'ss01';
  overflow: hidden;
}
#root { position: fixed; inset: 0; }
.hero-typing span {
  width: 9px; height: 9px; border-radius: 999px;
  background: hsl(var(--primary) / 0.55);
  display: inline-block;
  animation: heroDot 1.3s infinite ease-in-out;
}
.hero-typing span:nth-child(2) { animation-delay: 0.18s; }
.hero-typing span:nth-child(3) { animation-delay: 0.36s; }
@keyframes heroDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
  30% { transform: translateY(-5px); opacity: 1; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/animations.jsx"></script>
<script type="text/babel" src="lib/data.jsx"></script>
<script type="text/babel" src="lib/icons.jsx"></script>
<script type="text/babel" src="lib/chat.jsx"></script>
<script type="text/babel" src="lib/shell.jsx"></script>
<script type="text/babel" src="lib/app.jsx"></script>
</body>
</html>
